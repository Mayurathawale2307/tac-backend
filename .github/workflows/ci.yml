name: Backend CI

on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    env:
      MONGO_URI: ${{ secrets.MONGO_URI }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4

        with:
          node-version: 20
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Verify Node
        run: node --version

      # Uncomment later when tests exist
      # - name: Run Tests
      #   run: npm test

      - name: Build Docker Image
        run: docker build -t tac-backend .

      - name: Docker Build Success
        run: echo "Docker image built successfully"