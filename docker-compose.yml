services:
  backend:
    build: .
    env_file:
      - .env
    environment:
      PORT: 4000
      NODE_ENV: development
      BACKEND_URL: http://localhost:4000
      FRONTEND_URL: http://localhost:3000
      FRONTEND_URLS: http://localhost:3000,http://127.0.0.1:3000,https://tac-frontend-peach.vercel.app
      GOOGLE_CALLBACK_URL: http://localhost:4000/api/auth/google/callback
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/tac?schema=public
    command: sh -c "npx prisma db push --schema=prisma/schema.prisma && npm start"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4000:4000"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tac
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tac"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
