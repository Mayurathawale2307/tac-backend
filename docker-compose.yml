services:
  backend:
    build: .
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/tac?schema=public
    command: sh -c "npx prisma db push --schema=prisma/schema.prisma && npm start"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4000:4000"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tac
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tac"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
