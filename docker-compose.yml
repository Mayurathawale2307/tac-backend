  services:
    redis:
      image: redis:7-alpine
      ports:
        - "6379:6379"
      healthcheck:
        test: ["CMD", "redis-cli", "ping"]
        interval: 5s
        timeout: 3s
        retries: 5

    backend:
      build: .
      env_file:
        - .env.local
      environment:
        DATABASE_URL: postgresql://postgres:postgres@postgres:5432/tac?schema=public
        REDIS_URL: redis://redis:6379
      command: sh -c "npx prisma db push --schema=prisma/schema.prisma && npm start"
      depends_on:
        postgres:
          condition: service_healthy
        redis:
          condition: service_healthy
      ports:
        - "4000:4000"

    postgres:
      image: postgres:16-alpine
      environment:
        POSTGRES_DB: tac
        POSTGRES_PASSWORD: postgres
        POSTGRES_USER: postgres
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U postgres -d tac"]
        interval: 5s
        timeout: 5s
        retries: 10
      ports:
        - "5432:5432"
      volumes:
        - postgres-data:/var/lib/postgresql/data

  volumes:
    postgres-data: